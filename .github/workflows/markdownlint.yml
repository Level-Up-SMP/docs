name: Markdownlint

on:
  push:
    branches: [main]
    paths: ["**/*.md"]
  pull_request:
    branches: [main]
    paths: ["**/*.md"]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: DavidAnson/markdownlint-cli2-action@v23
        with:
          globs: |
            **/*.md
            !.github/**
