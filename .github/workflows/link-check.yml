name: Link Check

on:
  push:
    branches: [main]
    paths: ["**/*.md"]
  pull_request:
    branches: [main]
    paths: ["**/*.md"]
  schedule:
    - cron: "0 9 * * 1" # Every Monday at 09:00 UTC

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: lycheeverse/lychee-action@v2
        with:
          args: --config .lychee.toml **/*.md
          fail: true
